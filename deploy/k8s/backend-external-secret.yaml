# =============================================================================
# Product ExternalSecret
# -----------------------------------------------------------------------------
# ExternalSecret -> K8s Secret `backend-secret` consumed by the backend
# Deployment via `envFrom`. Assembles the DATABASE_URL DSN from the individual
# fields stored in Vault under `secret/imobimanager/database` so the backend's
# `settings.database_url` (config.py) receives a ready-to-use DSN, and
# `settings.secret_key` is consumed directly from `secret/imobimanager/app`.
#
# Vault paths (manual, one-time bootstrap):
#   secret/imobimanager/database -> host, port, name, user, password
#   secret/imobimanager/app      -> secret_key
# =============================================================================

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secret
  namespace: imobimanager
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: backend-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    # Assemble DATABASE_URL from the individual database fields via template.
    template:
      data:
        DATABASE_URL: "postgresql+asyncpg://{{ .DB_USER }}:{{ .DB_PASSWORD }}@{{ .DB_HOST }}:{{ .DB_PORT }}/{{ .DB_NAME }}"
  data:
    # Common fields used by the DATABASE_URL template above.
    - secretKey: DB_HOST
      remoteRef:
        key: secret/imobimanager/database
        property: host
    - secretKey: DB_PORT
      remoteRef:
        key: secret/imobimanager/database
        property: port
    - secretKey: DB_NAME
      remoteRef:
        key: secret/imobimanager/database
        property: name
    - secretKey: DB_USER
      remoteRef:
        key: secret/imobimanager/database
        property: user
    - secretKey: DB_PASSWORD
      remoteRef:
        key: secret/imobimanager/database
        property: password
    # JWT signing key — overrides the dev placeholder in config.py.
    - secretKey: SECRET_KEY
      remoteRef:
        key: secret/imobimanager/app
        property: secret_key
    # Shared secret with the bot pod (POST /bot/auth/validate, /mcp).
    # Pulled from the same Vault path as the bot's copy so both sides
    # always share the same value.
    - secretKey: BOT_MCP_API_KEY
      remoteRef:
        key: secret/imobimanager/bot
        property: bot_mcp_api_key
