# =============================================================================
# ImobiManager - Docker Compose
# Dev: docker compose up --build
# Prod: FRONTEND_TARGET=prod BACKEND_TARGET=prod docker compose up --build
# =============================================================================

services:
  postgres:
    image: postgres:17
    container_name: imobimanager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: imobi
      POSTGRES_PASSWORD: imobi
      POSTGRES_DB: imobimanager
    ports:
      - "5433:5432"
    volumes:
      - imobimanager-postgres-data:/var/lib/postgresql/data
      - ./backend/schema/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U imobi -d imobimanager"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: ${BACKEND_TARGET:-dev}
    container_name: imobimanager-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      UVICORN_RELOAD: ${UVICORN_RELOAD:-true}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic

  frontend:
    build:
      context: ./frontend
      target: ${FRONTEND_TARGET:-dev}
    container_name: imobimanager-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://backend:8000}
    ports:
      - "5174:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

  bot:
    build:
      context: ./bot
      target: ${BOT_TARGET:-dev}
    container_name: imobimanager-bot
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./bot/app:/app/app
      - ./bot/.env:/app/.env:ro

volumes:
  imobimanager-postgres-data: