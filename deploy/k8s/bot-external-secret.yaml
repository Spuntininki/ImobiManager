# =============================================================================
# Bot ExternalSecret
# -----------------------------------------------------------------------------
# ExternalSecret -> K8s Secret `bot-secret` consumed by the bot Deployment
# via `envFrom`. All three keys come from a single Vault path
# `secret/imobimanager/bot`.
#
# Vault paths (manual, one-time bootstrap):
#   secret/imobimanager/bot -> telegram_bot_token, bot_mcp_api_key,
#                              openrouter_api_key
#
# The `bot_mcp_api_key` is also referenced by `backend-external-secret.yaml`
# so the backend and the bot always share the same value from a single
# source of truth.
# =============================================================================

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bot-secret
  namespace: imobimanager
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: bot-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: secret/imobimanager/bot
        property: telegram_bot_token
    - secretKey: BOT_MCP_API_KEY
      remoteRef:
        key: secret/imobimanager/bot
        property: bot_mcp_api_key
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: secret/imobimanager/bot
        property: openrouter_api_key