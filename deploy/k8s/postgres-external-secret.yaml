# =============================================================================
# Postgres ExternalSecret
# -----------------------------------------------------------------------------
# Pulls the single `password` field from Vault `secret/imobimanager/database`
# and materializes it as the K8s Secret `postgres-secret`, consumed by the
# StatefulSet as POSTGRES_PASSWORD.
# =============================================================================

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-secret
  namespace: imobimanager
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: postgres-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: secret/imobimanager/database
        property: password
