# =============================================================================
# Ingress (single entry point)
# -----------------------------------------------------------------------------
# Exposed as imobimanager.sputinik.tech via Cloudflare Tunnel.
# The frontend Nginx proxies /api/ → backend:8000, so one ingress covering
# the frontend service handles both the SPA and API traffic.
# TLS terminated at the cluster by cert-manager self-signed issuer.
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: imobimanager
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: selfsigned-issuer
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - imobimanager.sputinik.tech
      secretName: imobimanager-tls
  rules:
    - host: imobimanager.sputinik.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
